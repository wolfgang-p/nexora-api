<!doctype html>
<html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koro · Kontrollzentrum</title>
<link rel="icon" type="image/svg+xml" href="https://www.koro.chat/img/logos/logo-symbol.svg">
<style>
:root{
  --bg:#070b12;--bg2:#0b111b;--card:#0f1623;--card2:#141d2c;--line:#1e2a3d;--line2:#283750;
  --tx:#e8eef8;--mut:#8597b3;--dim:#5a6b86;
  --ok:#2ecc71;--warn:#f5a623;--err:#ff5e6c;--accent:#0858fc;--accent2:#3d7bff;--accent3:#5b8dff;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(8,88,252,.10),transparent 60%),var(--bg);color:var(--tx);font:14px/1.55 'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.003em;min-height:100vh}
a{color:inherit}
.mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}

/* Header */
header{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(7,11,18,.82);backdrop-filter:saturate(160%) blur(12px);z-index:30}
.brand{display:flex;align-items:center;gap:11px}
.brand img{width:30px;height:30px;border-radius:9px;display:block}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.02em}
.brand .sub{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.right{margin-left:auto;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--mut)}
.right b{color:var(--tx)}
.health-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font-weight:700;font-size:12px;border:1px solid var(--line2)}
.health-chip.ok{color:var(--ok);background:rgba(46,204,113,.10);border-color:rgba(46,204,113,.3)}
.health-chip.warn{color:var(--warn);background:rgba(245,166,35,.10);border-color:rgba(245,166,35,.32)}
.health-chip.crit{color:var(--err);background:rgba(255,94,108,.12);border-color:rgba(255,94,108,.36)}
.pulse{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.35)}70%{box-shadow:0 0 0 7px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
label.auto{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
label.auto input{accent-color:var(--accent)}

/* Tabs */
nav.tabs{display:flex;gap:4px;padding:10px 22px 0;border-bottom:1px solid var(--line);position:sticky;top:57px;background:rgba(7,11,18,.82);backdrop-filter:blur(12px);z-index:29;overflow-x:auto}
nav.tabs button{appearance:none;border:none;background:transparent;color:var(--mut);font:600 13.5px/1 inherit;padding:11px 15px;border-radius:9px 9px 0 0;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px}
nav.tabs button:hover{color:var(--tx);background:var(--card)}
nav.tabs button.active{color:var(--accent3);border-bottom-color:var(--accent)}
nav.tabs button .badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px;background:var(--err);color:#fff}

.wrap{padding:22px;max-width:1480px;margin:0 auto}
#err{display:none;background:rgba(255,94,108,.15);border:1px solid rgba(255,94,108,.4);color:#ffd5d9;padding:9px 14px;border-radius:10px;margin-bottom:14px}
.panel{display:none}.panel.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Layout */
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid.k4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.card h2{margin:0 0 13px;font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);display:flex;align-items:center;gap:8px;font-weight:700}
.card h2 .dot{margin-left:auto}
.full{grid-column:1/-1}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
.dot.ok{background:var(--ok);box-shadow:0 0 10px var(--ok)}.dot.err{background:var(--err);box-shadow:0 0 10px var(--err)}.dot.warn{background:var(--warn);box-shadow:0 0 10px var(--warn)}
.muted{color:var(--mut)}.dim{color:var(--dim)}
.ok-txt{color:var(--ok)}.warn-txt{color:var(--warn)}.err-txt{color:var(--err)}.acc-txt{color:var(--accent3)}

/* KV + bars */
.kv{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:0}.kv .k{color:var(--mut)}.kv .v{text-align:right}
.bar{height:6px;border-radius:5px;background:var(--card2);overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:5px;transition:width .4s}
.bar.hot>i{background:linear-gradient(90deg,var(--warn),var(--err))}

/* Stat */
.stat{display:flex;flex-direction:column;gap:3px}
.stat .big{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat .lbl{font-size:11.5px;color:var(--mut);font-weight:600}
.stat .sub{font-size:11px;color:var(--dim)}
.statrow{display:flex;gap:14px;flex-wrap:wrap}
.statrow>div{flex:1;min-width:110px}
.iconbox{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(8,88,252,.14);color:var(--accent3);flex:none;font-size:18px}

/* Sparkline cards */
.spark-card{padding:14px 16px}
.spark-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.spark-head .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:700}
.spark-head .now{margin-left:auto;font-size:20px;font-weight:800;letter-spacing:-.02em}
.spark-head .unit{font-size:12px;color:var(--mut);font-weight:600}
svg.spark{display:block;width:100%;height:46px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:10.5px}
tbody tr:hover{background:var(--card2)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{font-size:10.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--mut);font-weight:700;display:inline-block}
.tag.ok{color:var(--ok);border-color:rgba(46,204,113,.35)}
.tag.warn{color:var(--warn);border-color:rgba(245,166,35,.35)}
.tag.err{color:var(--err);border-color:rgba(255,94,108,.4)}
.tag.acc{color:var(--accent3);border-color:rgba(61,123,255,.4)}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700}
.pill.ok{background:rgba(46,204,113,.14);color:var(--ok)}
.pill.warn{background:rgba(245,166,35,.14);color:var(--warn)}
.pill.err{background:rgba(255,94,108,.16);color:var(--err)}

/* Alerts */
.alerts{display:flex;flex-direction:column;gap:8px}
.alert{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;font-size:13px;border:1px solid var(--line2)}
.alert.warn{background:rgba(245,166,35,.09);border-color:rgba(245,166,35,.3)}
.alert.crit{background:rgba(255,94,108,.10);border-color:rgba(255,94,108,.36)}
.alert .ic{font-size:15px}

/* Buttons */
.btn{appearance:none;border:1px solid var(--line2);background:var(--card2);color:var(--tx);font:600 13px/1 inherit;padding:9px 14px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{border-color:var(--accent);background:rgba(8,88,252,.12)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.btn.danger{border-color:rgba(255,94,108,.4);color:var(--err)}
.btn.danger:hover{background:rgba(255,94,108,.12)}
.btn:disabled{opacity:.5;cursor:default}
.field{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input.in{background:var(--bg);border:1px solid var(--line2);color:var(--tx);border-radius:10px;padding:9px 12px;font:inherit;font-size:13px;outline:none}
input.in:focus{border-color:var(--accent)}
.note{font-size:11.5px;color:var(--dim);margin-top:8px;line-height:1.5}
.empty{color:var(--dim);font-size:12.5px;padding:14px 0;text-align:center}
.spin{width:26px;height:26px;border:3px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:rot .8s linear infinite;margin:30px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.gauge{display:flex;align-items:center;gap:14px}
.donut{--p:0;--c:var(--accent);width:74px;height:74px;border-radius:50%;flex:none;background:conic-gradient(var(--c) calc(var(--p)*1%),var(--card2) 0);display:flex;align-items:center;justify-content:center;position:relative}
.donut::after{content:'';position:absolute;inset:9px;border-radius:50%;background:var(--card)}
.donut span{position:relative;z-index:1;font-weight:800;font-size:16px}
</style></head>
<body>
<header>
  <div class="brand">
    <img src="https://www.koro.chat/img/logos/logo-symbol.svg" alt="Koro" onerror="this.style.display='none'">
    <div><b>Koro</b> <span class="sub">Kontrollzentrum</span></div>
  </div>
  <span class="health-chip ok" id="health"><span class="pulse"></span> <span id="healthtx">…</span></span>
  <div class="right">
    <span>served by <b class="mono" id="servedby">–</b></span>
    <span><b id="updated">–</b></span>
    <label class="auto"><input type="checkbox" id="auto" checked> auto</label>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="wrap">
  <div id="err"></div>
  <div id="content"><div class="spin"></div></div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmtBytes=n=>{if(n==null)return'–';const u=['B','KB','MB','GB','TB'];let i=0;n=+n;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(i?1:0)+' '+u[i]};
const fmtN=n=>n==null?'–':(+n).toLocaleString('de-DE');
const fmtDur=s=>{if(s==null)return'–';s=Math.floor(s);const d=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);return((d?d+'d ':'')+(h?h+'h ':'')+(d?'':m+'m'+(h?'':' '+(s%60)+'s'))).trim()||'0s'};
const ago=ms=>{if(!ms)return'–';const s=Math.floor((Date.now()-ms)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct=n=>n==null?'–':(n*100).toFixed(0)+'%';
const kv=(k,v)=>'<div class="kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
const bar=(p,hot)=>'<div class="bar'+(hot?' hot':'')+'"><i style="width:'+Math.min(100,Math.max(0,p||0)).toFixed(1)+'%"></i></div>';
const card=(title,inner,extra)=>'<div class="card'+(extra||'')+'"><h2>'+title+'</h2>'+inner+'</div>';

let DATA=null, FLAGS=[];

const TABS=[
  {id:'overview',label:'Übersicht',icon:'◧'},
  {id:'realtime',label:'Calls & Meetings',icon:'📞'},
  {id:'infra',label:'Infrastruktur',icon:'⚙'},
  {id:'perf',label:'Performance',icon:'⚡'},
  {id:'security',label:'Sicherheit',icon:'🛡'},
  {id:'product',label:'Produkt',icon:'📊'},
  {id:'actions',label:'Aktionen',icon:'⌘'},
];
let TAB=location.hash.replace('#','')||'overview';
if(!TABS.find(t=>t.id===TAB))TAB='overview';

function renderTabs(){
  $('tabs').innerHTML=TABS.map(t=>{
    const alertN=(t.id==='overview'&&DATA&&DATA.health)?DATA.health.alerts.length:0;
    return '<button data-tab="'+t.id+'" class="'+(t.id===TAB?'active':'')+'">'+t.icon+' '+t.label+
      (alertN?' <span class="badge">'+alertN+'</span>':'')+'</button>';
  }).join('');
  $('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;location.hash=TAB;renderTabs();renderTab();});
}

// ── Sparkline SVG ──────────────────────────────────────────────
function sparkSvg(points,color){
  if(!points||!points.length)return '<svg class="spark"></svg>';
  const W=300,H=46,pad=3;const max=Math.max(1,...points),min=Math.min(0,...points);
  const rng=(max-min)||1;const n=points.length;
  const x=i=>pad+(n<=1?0:i/(n-1)*(W-2*pad));
  const y=v=>H-pad-((v-min)/rng)*(H-2*pad);
  let d='';points.forEach((v,i)=>d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ');
  const area=d+'L'+x(n-1).toFixed(1)+' '+H+' L'+x(0).toFixed(1)+' '+H+' Z';
  const gid='g'+Math.random().toString(36).slice(2,7);
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0" stop-color="'+color+'" stop-opacity=".28"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')"/>'+
    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/></svg>';
}
function sparkCard(lbl,points,key,fmt,color,unit){
  const last=points&&points.length?points[points.length-1][key]:null;
  const series=(points||[]).map(p=>p[key]);
  return '<div class="card spark-card"><div class="spark-head"><span class="lbl">'+lbl+'</span>'+
    '<span class="now">'+(last==null?'–':fmt(last))+'</span><span class="unit">'+(unit||'')+'</span></div>'+
    sparkSvg(series,color)+'</div>';
}

// ── Fetch ──────────────────────────────────────────────────────
async function load(){
  try{
    const r=await fetch('/status/data',{cache:'no-store'});
    if(r.status===401){location.reload();return}
    if(!r.ok)throw new Error('HTTP '+r.status);
    DATA=await r.json();
    $('err').style.display='none';
    paintHeader();renderTabs();renderTab();
  }catch(e){$('err').textContent='Fehler beim Laden: '+e.message;$('err').style.display='block';}
}

function paintHeader(){
  const d=DATA;if(!d)return;
  $('servedby').textContent=d.served_by||'–';
  $('updated').textContent='aktualisiert '+new Date(d.now).toLocaleTimeString('de-DE');
  const h=d.health||{level:'ok',alerts:[]};
  $('health').className='health-chip '+h.level;
  $('healthtx').textContent=h.level==='ok'?'Alle Systeme normal':h.level==='warn'?h.alerts.length+' Warnung(en)':h.alerts.length+' kritisch';
}

function instList(){return Object.values((DATA&&DATA.instances)||{}).sort((a,b)=>a.instance>b.instance?1:-1);}
function freshInst(){const n=Date.now();return instList().find(i=>n-i.ts<20000)||instList()[0];}

// ── Tab renderers ──────────────────────────────────────────────
function renderTab(){
  const d=DATA;if(!d){return;}
  const R={overview,realtime,infra,perf,security,product,actions}[TAB];
  $('content').innerHTML=R?R(d):'';
  if(TAB==='actions')wireActions();
}

function overview(d){
  const h=d.health||{alerts:[]};
  const rt=d.realtime||{},pr=d.presence||{},kp=d.kpis||{};
  let alerts=h.alerts.length
    ? '<div class="alerts">'+h.alerts.map(a=>'<div class="alert '+a.level+'"><span class="ic">'+(a.level==='crit'?'⛔':'⚠️')+'</span>'+esc(a.text)+'</div>').join('')+'</div>'
    : '<div class="alert" style="background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.3)"><span class="ic">✅</span>Keine aktiven Alerts — alle Systeme im grünen Bereich.</div>';

  const hist=(d.history&&Object.values(d.history)[0])||[];
  const sparks='<div class="grid k4">'+
    sparkCard('CPU (Prozess)',hist,'cpu',v=>v.toFixed(0)+'%','#3d7bff','')+
    sparkCard('Heap',hist,'heap',v=>v.toFixed(0)+'%','#5b8dff','')+
    sparkCard('Event-Loop p99',hist,'lag',v=>v.toFixed(0),'#f5a623','ms')+
    sparkCard('WS Sockets',hist,'sockets',v=>fmtN(v),'#2ecc71','')+
  '</div>';

  const quick='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('📞','Aktive Calls',fmtN(rt.activeCalls),'+ '+fmtN(rt.activeMeetings)+' Meetings live')+
    statCard('🟢','Geräte online',fmtN(pr.onlineDevices),fmtN(pr.totalSockets)+' Sockets')+
    statCard('💬','Nachrichten (24h)',fmtN(kp.messagesToday),fmtN(kp.usersToday)+' neue Nutzer')+
    statCard('🎯','Call-Erfolg (24h)',rt.successRate==null?'–':pct(rt.successRate),fmtN(rt.callsToday)+' Anrufe')+
  '</div>';

  return '<div class="grid" style="grid-template-columns:1fr;margin-bottom:14px">'+card('System-Health · '+h.level.toUpperCase(),alerts)+'</div>'+
    quick+sparks;
}
function statCard(icon,lbl,big,sub){
  return '<div class="card"><div class="statrow" style="align-items:center"><div class="iconbox">'+icon+'</div>'+
    '<div class="stat" style="flex:1"><div class="big">'+big+'</div><div class="lbl">'+lbl+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div></div></div>';
}

function realtime(d){
  const rt=d.realtime||{};
  if(!rt.ok)return card('Calls & Meetings','<div class="empty">'+esc(rt.error||'n/a')+'</div>');
  const sr=rt.successRate;
  const cards='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('📞','Aktive Calls',fmtN(rt.activeCalls))+
    statCard('🎥','Aktive Meetings',fmtN(rt.activeMeetings),fmtN(rt.liveParticipants)+' Teilnehmer')+
    statCard('📅','Calls heute',fmtN(rt.callsToday),'Ø '+(rt.avgDurationSec?fmtDur(rt.avgDurationSec):'–'))+
    statCard('🎬','Meetings heute',fmtN(rt.meetingsToday))+
  '</div>';
  const donutP=sr==null?0:Math.round(sr*100);
  const donutC=sr==null?'var(--mut)':sr>.85?'var(--ok)':sr>.6?'var(--warn)':'var(--err)';
  const quality=card('Verbindungs-Qualität (24h)',
    '<div class="gauge"><div class="donut" style="--p:'+donutP+';--c:'+donutC+'"><span>'+(sr==null?'–':donutP+'%')+'</span></div>'+
    '<div style="flex:1">'+
      kv('Erfolgreich',`<span class="ok-txt">`+fmtN(rt.callsOkToday)+'</span>')+
      kv('Fehlgeschlagen',`<span class="err-txt">`+fmtN(rt.callsFailedToday)+'</span>')+
      kv('Verpasst/Abgelehnt','<span class="warn-txt">'+fmtN(rt.callsMissedToday)+'</span>')+
    '</div></div>'+
    '<div class="note">Erfolgsquote = angenommen ÷ (angenommen + fehlgeschlagen/unerreichbar). Verpasste zählen nicht als Fehler.</div>');
  const turn=d.turn||{};
  const turnCard=card('TURN / ICE',
    kv('Provider','<span class="tag '+(turn.configured?'ok':'err')+'">'+esc(turn.provider||'none')+'</span>')+
    kv('Cloudflare TURN',turn.cloudflare?'<span class="ok-txt">aktiv</span>':'<span class="dim">–</span>')+
    kv('Statische TURN-URLs',fmtN(turn.staticUrls))+
    kv('STUN-URLs',fmtN(turn.stunUrls))+
    '<div class="note">TURN-Relay ist nötig, wenn beide Peers hinter striktem NAT/Firewall sitzen.</div>');
  return cards+'<div class="grid">'+quality+turnCard+'</div>';
}

function infra(d){
  let html='<div class="grid" style="margin-bottom:14px">';
  // API instances
  html+=card('API Instanzen','<div class="statrow">'+instList().map(i=>{
    const stale=Date.now()-i.ts>20000;
    return '<div class="stat"><div class="big">'+(stale?'<span class="err-txt">offline</span>':'<span class="ok-txt">●</span> '+esc(i.instance))+'</div>'+
      '<div class="sub">up '+fmtDur(i.uptimeSec)+' · '+esc((i.version||'').slice(0,7))+'</div>'+
      '<div class="sub">'+fmtN(i.ws.sockets)+' sockets / '+fmtN(i.ws.devices)+' devices</div></div>';
  }).join('')||'<span class="empty">keine Instanz</span>'+'</div>');
  // Redis
  const rd=d.redis||{};
  html+=card('<span class="dot '+(rd.ok?'ok':'err')+'"></span> Redis',rd.ok
    ? kv('Ping',rd.pingMs+' ms')+kv('Version',esc(rd.version))+kv('Clients',rd.clients)+kv('Speicher',esc(rd.usedMemoryHuman))+kv('Ops/s',rd.opsPerSec)+kv('Uptime',fmtDur(+rd.uptimeSec))
    : '<div class="empty err-txt">'+esc(rd.error||'n/a')+'</div>');
  // DB
  const db=d.db||{};
  let dbh=db.ok?kv('Latenz',db.latencyMs+' ms'):'';
  if(db.ok)for(const[t,c]of Object.entries(db.counts||{}))dbh+=kv('~'+t,fmtN(c));
  html+=card('<span class="dot '+(db.ok?'ok':'err')+'"></span> Datenbank',db.ok?dbh:'<div class="empty err-txt">'+esc(db.error||'n/a')+'</div>');
  // Host
  const hh=freshInst();
  if(hh){const s=hh.sys,mu=s.memTotal-s.memFree,mp=mu/s.memTotal*100,up=hh.disk&&hh.disk.uploads;
    html+=card('Host',kv('Host',esc(s.hostname))+
      '<div class="kv"><span class="k">CPU ('+s.cpus+' cores)</span><span class="v">'+s.hostCpuPct.toFixed(1)+'%</span></div>'+bar(s.hostCpuPct,s.hostCpuPct>85)+
      '<div class="kv"><span class="k">RAM</span><span class="v">'+fmtBytes(mu)+' / '+fmtBytes(s.memTotal)+'</span></div>'+bar(mp,mp>90)+
      kv('Load',s.loadavg.map(x=>x.toFixed(2)).join(' / '))+
      (up?'<div class="kv"><span class="k">Disk</span><span class="v">'+fmtBytes(up.used)+' / '+fmtBytes(up.total)+'</span></div>'+bar(up.usedPct,up.usedPct>90):'')+
      kv('Host-Uptime',fmtDur(s.sysUptimeSec)));}
  html+='</div>';
  // Instance detail
  html+=card('Instanz-Details','<div class="grid">'+instList().map(i=>{
    const stale=Date.now()-i.ts>20000;const heapMax=i.mem.heapLimit||i.mem.heapTotal;const hp=i.mem.heapUsed/heapMax*100;
    return '<div style="background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px 15px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="dot '+(stale?'err':'ok')+'"></span><b>'+esc(i.instance)+'</b><span class="tag mono" style="margin-left:auto">'+esc((i.version||'').slice(0,7))+'</span></div>'+
      kv('Uptime',fmtDur(i.uptimeSec))+kv('Proz. CPU',i.procCpuPct.toFixed(1)+'%')+kv('RSS',fmtBytes(i.mem.rss))+
      '<div class="kv"><span class="k">Heap</span><span class="v">'+fmtBytes(i.mem.heapUsed)+' / '+fmtBytes(heapMax)+'</span></div>'+bar(hp,hp>90)+
      kv('Loop-Lag p99',i.eventLoopLagMs.p99.toFixed(1)+' ms')+kv('WS','sock '+fmtN(i.ws.sockets)+' / dev '+fmtN(i.ws.devices))+
      kv('Letzter Beat',ago(i.ts)+' her')+'</div>';
  }).join('')+'</div>','full');
  // Deploy + events + git
  const dp=d.deploy||{};
  html+='<div class="grid" style="margin-top:14px">';
  html+=card('Deploy / Version',kv('Läuft',`<span class="mono">`+esc((dp.running||'').slice(0,9))+'</span>')+
    kv('Version-Drift',dp.drift?'<span class="pill err">JA — Instanzen uneinig</span>':'<span class="pill ok">synchron</span>')+
    kv('Versionen',(dp.versions||[]).map(v=>'<span class="tag mono">'+esc((v||'').slice(0,7))+'</span>').join(' ')||'–'));
  html+=card('Event- / Restart-Log','<table><tbody>'+((d.events||[]).slice(0,10).map(e=>
    '<tr><td class="muted">'+ago(e.at)+'</td><td><span class="tag '+esc(typeTag(e.type))+'">'+esc(e.type)+'</span></td><td class="mono">'+esc(e.instance)+'</td></tr>').join(''))+'</tbody></table>'+((d.events||[]).length?'':'<div class="empty">keine Events</div>'));
  html+=card('Git-Historie','<table><tbody>'+((d.git||[]).slice(0,8).map(g=>
    '<tr><td class="mono acc-txt">'+esc(g.hash)+'</td><td class="muted">'+esc((g.date||'').slice(0,10))+'</td><td>'+esc(g.subject)+'</td></tr>').join(''))+'</tbody></table>'+((d.git||[]).length?'':'<div class="empty">.git nicht gemountet</div>'));
  html+='</div>';
  return html;
}
function typeTag(t){return t==='boot'?'acc':t==='deploy'?'ok':t==='shutdown'?'warn':'';}

function perf(d){
  const apm=d.apm||{slowest:[],topErrors:[],statusBuckets:{}};
  const sb=apm.statusBuckets||{};
  const total=Object.values(sb).reduce((a,b)=>a+b,0)||1;
  let html='<div class="grid" style="margin-bottom:14px">';
  html+=card('HTTP-Status (seit Start)','<div class="statrow">'+
    ['2xx','3xx','4xx','5xx'].map(k=>'<div class="stat"><div class="big '+(k==='5xx'?'err-txt':k==='4xx'?'warn-txt':'ok-txt')+'">'+fmtN(sb[k]||0)+'</div><div class="lbl">'+k+'</div><div class="sub">'+((sb[k]||0)/total*100).toFixed(1)+'%</div></div>').join('')+'</div>');
  const rl=d.rateLimit||{};
  html+=card('Rate-Limiting (15 min)',kv('Aktive Buckets',fmtN(rl.activeBuckets))+kv('429-Treffer',fmtN(rl.total))+
    '<div class="note">Top limitierte Schlüssel:</div><table><tbody>'+((rl.top||[]).slice(0,6).map(r=>'<tr><td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">'+esc(r.key)+'</td><td class="num">'+fmtN(r.count)+'</td><td class="muted num">'+ago(r.lastAt)+'</td></tr>').join(''))+'</tbody></table>'+((rl.top||[]).length?'':'<div class="empty">keine Limits ausgelöst</div>'));
  html+='</div>';
  html+=card('Langsamste Endpoints (p95)','<table><thead><tr><th>Route</th><th class="num">Anfragen</th><th class="num">Ø ms</th><th class="num">p95 ms</th><th class="num">max ms</th><th class="num">5xx</th></tr></thead><tbody>'+
    (apm.slowest||[]).map(r=>'<tr><td class="mono">'+esc(r.route)+'</td><td class="num">'+fmtN(r.count)+'</td><td class="num">'+r.avgMs.toFixed(1)+'</td><td class="num">'+r.p95Ms.toFixed(0)+'</td><td class="num">'+r.maxMs.toFixed(0)+'</td><td class="num '+(r.errors?'err-txt':'')+'">'+fmtN(r.errors)+'</td></tr>').join('')+'</tbody></table>'+((apm.slowest||[]).length?'':'<div class="empty">noch keine Daten</div>'),'full');
  if((apm.topErrors||[]).length)html+='<div style="margin-top:14px">'+card('Endpoints mit Fehlern (5xx)','<table><thead><tr><th>Route</th><th class="num">5xx</th><th class="num">Fehlerquote</th><th class="num">Anfragen</th></tr></thead><tbody>'+
    apm.topErrors.map(r=>'<tr><td class="mono">'+esc(r.route)+'</td><td class="num err-txt">'+fmtN(r.errors)+'</td><td class="num">'+(r.errorRate*100).toFixed(1)+'%</td><td class="num">'+fmtN(r.count)+'</td></tr>').join('')+'</tbody></table>','full')+'</div>';
  return html;
}

function security(d){
  const a=d.audit||{events:[]};
  let html='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('🔑','Fehl-Logins (24h)',fmtN(a.failedLogins))+
    statCard('📱','Neue Geräte (24h)',fmtN(a.newDevices))+
    statCard('🚫','Revokes (24h)',fmtN(a.revokes))+
    statCard('🗑','Löschungen (24h)',fmtN(a.deletions))+
  '</div>';
  // scheduler
  const sc=d.scheduler||{jobs:{}};
  const overdue=sc.lastTickAt&&Date.now()-sc.lastTickAt>90000;
  html+='<div class="grid" style="margin-bottom:14px">';
  html+=card('Scheduler '+(overdue?'<span class="pill err" style="margin-left:auto">überfällig</span>':'<span class="pill ok" style="margin-left:auto">aktiv</span>'),
    kv('Letzter Tick',ago(sc.lastTickAt)+' her')+kv('Intervall',(sc.tickMs/1000)+'s')+
    '<table><tbody>'+Object.entries(sc.jobs||{}).map(([n,j])=>'<tr><td>'+esc(n)+'</td><td class="muted num">'+ago(j.lastRunAt)+'</td><td class="num">'+j.lastDurationMs+' ms</td><td>'+(j.lastError?'<span class="tag err">Fehler</span>':'<span class="tag ok">ok</span>')+'</td></tr>').join('')+'</tbody></table>');
  // webhooks
  const wh=d.webhooks||{};
  html+=card('Webhooks',wh.ok?kv('Endpoints',fmtN(wh.hooks))+kv('Wartend',fmtN(wh.pending))+kv('Zugestellt (24h)','<span class="ok-txt">'+fmtN(wh.deliveredToday)+'</span>')+kv('Fehlgeschlagen (24h)','<span class="err-txt">'+fmtN(wh.failedToday)+'</span>')+kv('Dead-Letter',wh.deadletter?'<span class="err-txt">'+fmtN(wh.deadletter)+'</span>':'0')+kv('Erfolgsquote',pct(wh.successRate)):'<div class="empty">'+esc(wh.error||'n/a')+'</div>');
  // push
  const pu=d.push||{};
  html+=card('Push-Zustellung',kv('Gesendet',fmtN(pu.sent))+kv('Fehlgeschlagen','<span class="'+(pu.failed?'err-txt':'')+'">'+fmtN(pu.failed)+'</span>')+kv('Tote Tokens',fmtN(pu.dead))+kv('Erfolgsquote',pu.successRate==null?'<span class="dim">noch keine Daten</span>':pct(pu.successRate)));
  html+='</div>';
  html+=card('Audit-Feed (letzte 40)','<table><thead><tr><th>Zeit</th><th>Aktion</th><th>Ziel</th><th>IP</th></tr></thead><tbody>'+
    (a.events||[]).map(e=>'<tr><td class="muted">'+ago(new Date(e.created_at).getTime())+'</td><td><span class="tag '+(/(fail|revoke|delete|block)/.test(e.action)?'err':'acc')+'">'+esc(e.action)+'</span></td><td class="muted">'+esc(e.target_type||'')+'</td><td class="mono dim">'+esc(e.ip_address||'')+'</td></tr>').join('')+'</tbody></table>'+((a.events||[]).length?'':'<div class="empty">'+esc(a.error||'keine Events')+'</div>'),'full');
  return html;
}

function product(d){
  const k=d.kpis||{},cl=d.clients||{byKind:{}};
  let html='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('👥','Nutzer gesamt',fmtN(k.usersTotal),'+'+fmtN(k.usersToday)+' heute')+
    statCard('📈','Neu (7 Tage)',fmtN(k.usersWeek))+
    statCard('🟢','Aktiv (7 Tage)',fmtN(k.activeUsersWeek),'Geräte mit Aktivität')+
    statCard('💬','Nachrichten (24h)',fmtN(k.messagesToday))+
  '</div>';
  html+='<div class="grid" style="margin-bottom:14px">'+
    statCard('🎥','Meetings gesamt',fmtN(k.meetingsTotal))+
    statCard('🗂','Workspaces',fmtN(k.workspacesTotal))+
    statCard('🤖','Bots',fmtN(k.botsTotal))+
  '</div>';
  const kinds=cl.byKind||{};const totalC=Object.values(kinds).reduce((a,b)=>a+(b||0),0)||1;
  const labels={mobile:'📱 Mobile',web:'🌐 Web',desktop:'🖥 Desktop',crm_seat:'🏢 CRM',api_bot:'🤖 Bot'};
  html+=card('Client-Verteilung (aktive Geräte, 7 Tage)','<div style="display:flex;flex-direction:column;gap:10px">'+
    Object.entries(labels).map(([kk,lbl])=>'<div><div class="kv"><span class="k">'+lbl+'</span><span class="v">'+fmtN(kinds[kk])+' · '+((kinds[kk]||0)/totalC*100).toFixed(0)+'%</span></div>'+bar((kinds[kk]||0)/totalC*100)+'</div>').join('')+'</div>'+
    '<div class="note">Wichtig vor Breaking-Changes: zeigt, wie viele Geräte je Plattform noch aktiv sind.</div>');
  return html;
}

// ── Actions tab ────────────────────────────────────────────────
function actions(d){
  const wh=d.webhooks||{};
  return '<div class="grid">'+
    card('🔁 Webhooks erneut zustellen',
      '<p class="muted" style="margin-top:0">Setzt fehlgeschlagene Zustellungen (Dead-Letter, letzte 24h) zurück, damit der Worker erneut versucht.</p>'+
      kv('In Dead-Letter',(wh.deadletter||0)+'')+
      '<div class="field" style="margin-top:12px"><button class="btn primary" data-act="webhooks.retry">Erneut zustellen</button></div>'+
      '<div class="note" id="r-webhooks.retry"></div>')+
    card('🚫 Gerät widerrufen',
      '<p class="muted" style="margin-top:0">Notfall: widerruft ein einzelnes Gerät sofort und trennt seine Verbindung.</p>'+
      '<div class="field"><input class="in" id="revoke-id" placeholder="device_id (UUID)" style="flex:1;min-width:220px"><button class="btn danger" data-act="device.revoke">Widerrufen</button></div>'+
      '<div class="note" id="r-device.revoke"></div>')+
    card('🚩 Feature-Flag setzen',
      '<div class="field"><input class="in" id="flag-key" placeholder="flag_key" style="flex:1;min-width:160px">'+
      '<select class="in" id="flag-rollout"><option value="off">off</option><option value="on">on</option><option value="percent">percent</option></select>'+
      '<input class="in" id="flag-pct" placeholder="%" style="width:70px">'+
      '<button class="btn primary" data-act="flag.set">Speichern</button></div>'+
      '<div class="note" id="r-flag.set"></div>'+
      '<div id="flaglist" style="margin-top:12px"></div>')+
  '</div>';
}
function wireActions(){
  loadFlags();
  $('content').querySelectorAll('[data-act]').forEach(b=>b.onclick=async()=>{
    const act=b.dataset.act;const out=$('r-'+act);b.disabled=true;if(out)out.textContent='läuft…';
    let body={};
    if(act==='device.revoke')body={deviceId:$('revoke-id').value.trim()};
    if(act==='flag.set')body={key:$('flag-key').value.trim(),rollout:$('flag-rollout').value,percent:$('flag-pct').value?+$('flag-pct').value:null};
    try{
      const r=await fetch('/status/action/'+act,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json();
      if(out)out.innerHTML=j.ok?'<span class="ok-txt">✓ '+esc(JSON.stringify({...j,ok:undefined})).replace('{}','erledigt')+'</span>':'<span class="err-txt">'+esc(j.error)+'</span>';
      if(act==='flag.set')loadFlags();
    }catch(e){if(out)out.innerHTML='<span class="err-txt">'+esc(e.message)+'</span>';}
    finally{b.disabled=false;}
  });
}
async function loadFlags(){
  try{const r=await fetch('/status/flags',{cache:'no-store'});const j=await r.json();FLAGS=j.flags||[];
    const el=$('flaglist');if(!el)return;
    el.innerHTML='<table><thead><tr><th>Flag</th><th>Rollout</th><th>%</th></tr></thead><tbody>'+
      FLAGS.map(f=>'<tr><td class="mono">'+esc(f.key)+'</td><td><span class="tag '+(f.rollout==='on'?'ok':f.rollout==='off'?'':'acc')+'">'+esc(f.rollout)+'</span></td><td class="num">'+(f.percent??'–')+'</td></tr>').join('')+'</tbody></table>'+(FLAGS.length?'':'<div class="empty">keine Flags</div>');
  }catch{}
}

renderTabs();
load();
let timer=setInterval(()=>{if($('auto').checked)load();},5000);
$('auto').addEventListener('change',()=>{if($('auto').checked)load();});
</script>
</body></html>
