<!doctype html>
<html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koro · Kontrollzentrum</title>
<link rel="icon" type="image/svg+xml" href="https://www.koro.chat/img/logos/logo-symbol.svg">
<style>
:root{
  /* Light theme */
  --bg:#f4f6fb;--bg2:#eef1f7;--card:#ffffff;--card2:#f6f8fc;--line:#e5e9f2;--line2:#d4dbe8;
  --tx:#0f1828;--mut:#5b6b85;--dim:#90a0ba;
  --ok:#16a34a;--ok-bg:#e9f8ef;--warn:#d97706;--warn-bg:#fef4e6;--err:#dc2626;--err-bg:#fdeced;
  --accent:#0858fc;--accent2:#2f6dff;--accent3:#0858fc;--accent-bg:#eaf1ff;
  --r:16px;--r2:11px;--shadow:0 1px 2px rgba(15,24,40,.04),0 4px 14px rgba(15,24,40,.05);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(1100px 520px at 82% -8%,rgba(8,88,252,.07),transparent 60%),var(--bg);color:var(--tx);font:14px/1.55 'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.003em;min-height:100vh}
a{color:inherit}
.mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}
svg.i{width:1em;height:1em;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;flex:none;display:inline-block;vertical-align:-.13em}

/* Header */
header{display:flex;align-items:center;gap:14px;padding:13px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.86);backdrop-filter:saturate(160%) blur(14px);z-index:30}
.brand{display:flex;align-items:center;gap:11px}
.brand img{width:30px;height:30px;border-radius:9px;display:block}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.02em}
.brand .sub{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.right{margin-left:auto;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--mut)}
.right b{color:var(--tx)}
.health-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:999px;font-weight:700;font-size:12px;border:1px solid var(--line2)}
.health-chip svg.i{font-size:14px}
.health-chip.ok{color:var(--ok);background:var(--ok-bg);border-color:rgba(22,163,74,.25)}
.health-chip.warn{color:var(--warn);background:var(--warn-bg);border-color:rgba(217,119,6,.28)}
.health-chip.crit{color:var(--err);background:var(--err-bg);border-color:rgba(220,38,38,.3)}
.pulse{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;opacity:1}70%{box-shadow:0 0 0 7px transparent;opacity:.7}100%{box-shadow:0 0 0 0 transparent;opacity:1}}
label.auto{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
label.auto input{accent-color:var(--accent)}

/* Tabs */
nav.tabs{display:flex;gap:4px;padding:9px 24px 0;border-bottom:1px solid var(--line);position:sticky;top:56px;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);z-index:29;overflow-x:auto}
nav.tabs button{appearance:none;border:none;background:transparent;color:var(--mut);font:600 13.5px/1 inherit;padding:11px 14px;border-radius:9px 9px 0 0;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px}
nav.tabs button svg.i{font-size:16px}
nav.tabs button:hover{color:var(--tx);background:var(--card2)}
nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
nav.tabs button .badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px;background:var(--err);color:#fff}

.wrap{padding:24px;max-width:1480px;margin:0 auto}
#err{display:none;background:var(--err-bg);border:1px solid rgba(220,38,38,.3);color:#9b1c1c;padding:9px 14px;border-radius:10px;margin-bottom:14px}
.panel{display:none}.panel.active{display:block}

/* Layout */
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid.k4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 19px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.card h2{margin:0 0 13px;font-size:11.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);display:flex;align-items:center;gap:8px;font-weight:700}
.card h2 svg.i{font-size:15px;color:var(--accent)}
.card h2 .r{margin-left:auto;display:inline-flex;align-items:center;gap:6px}
.full{grid-column:1/-1}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
.dot.ok{background:var(--ok)}.dot.err{background:var(--err)}.dot.warn{background:var(--warn)}
.muted{color:var(--mut)}.dim{color:var(--dim)}
.ok-txt{color:var(--ok)}.warn-txt{color:var(--warn)}.err-txt{color:var(--err)}.acc-txt{color:var(--accent)}

/* KV + bars */
.kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:0}.kv .k{color:var(--mut)}.kv .v{text-align:right;font-weight:500}
.bar{height:7px;border-radius:5px;background:var(--bg2);overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .4s}
.bar.hot>i{background:linear-gradient(90deg,var(--warn),var(--err))}

/* Stat */
.stat{display:flex;flex-direction:column;gap:3px}
.stat .big{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.05}
.stat .lbl{font-size:11.5px;color:var(--mut);font-weight:600}
.stat .sub{font-size:11px;color:var(--dim)}
.statrow{display:flex;gap:14px;flex-wrap:wrap}
.statrow>div{flex:1;min-width:110px}
.iconbox{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);color:var(--accent);flex:none;font-size:20px}

/* Sparkline cards */
.spark-card{padding:15px 17px}
.spark-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.spark-head .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:700;display:inline-flex;align-items:center;gap:6px}
.spark-head .lbl svg.i{font-size:13px;color:var(--accent)}
.spark-head .now{margin-left:auto;font-size:20px;font-weight:800;letter-spacing:-.02em}
.spark-head .unit{font-size:12px;color:var(--mut);font-weight:600}
svg.spark{display:block;width:100%;height:46px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:10.5px}
tbody tr:hover{background:var(--card2)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{font-size:10.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--mut);font-weight:700;display:inline-block;background:var(--card2)}
.tag.ok{color:var(--ok);border-color:rgba(22,163,74,.3);background:var(--ok-bg)}
.tag.warn{color:var(--warn);border-color:rgba(217,119,6,.3);background:var(--warn-bg)}
.tag.err{color:var(--err);border-color:rgba(220,38,38,.3);background:var(--err-bg)}
.tag.acc{color:var(--accent);border-color:rgba(8,88,252,.3);background:var(--accent-bg)}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.pill svg.i{font-size:12px}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.err{background:var(--err-bg);color:var(--err)}

/* Alerts */
.alerts{display:flex;flex-direction:column;gap:8px}
.alert{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;font-size:13px;border:1px solid var(--line2);background:var(--card2)}
.alert svg.i{font-size:17px;flex:none}
.alert.ok{background:var(--ok-bg);border-color:rgba(22,163,74,.25);color:#15803d}
.alert.warn{background:var(--warn-bg);border-color:rgba(217,119,6,.28);color:#b45309}
.alert.crit{background:var(--err-bg);border-color:rgba(220,38,38,.3);color:#b91c1c}

/* Buttons + inputs */
.btn{appearance:none;border:1px solid var(--line2);background:var(--card);color:var(--tx);font:600 13px/1 inherit;padding:9px 14px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn svg.i{font-size:15px}
.btn:hover{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(8,88,252,.25)}
.btn.primary:hover{filter:brightness(1.05);color:#fff}
.btn.danger{border-color:rgba(220,38,38,.35);color:var(--err)}
.btn.danger:hover{background:var(--err-bg);color:var(--err);border-color:var(--err)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:default}
.field{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input.in,select.in{background:var(--card);border:1px solid var(--line2);color:var(--tx);border-radius:10px;padding:9px 12px;font:inherit;font-size:13px;outline:none}
input.in:focus,select.in:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(8,88,252,.12)}
.note{font-size:11.5px;color:var(--dim);margin-top:8px;line-height:1.5}
.empty{color:var(--dim);font-size:12.5px;padding:16px 0;text-align:center}
.spin{width:26px;height:26px;border:3px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:rot .8s linear infinite;margin:40px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.gauge{display:flex;align-items:center;gap:16px}
.donut{--p:0;--c:var(--accent);width:78px;height:78px;border-radius:50%;flex:none;background:conic-gradient(var(--c) calc(var(--p)*1%),var(--bg2) 0);display:flex;align-items:center;justify-content:center;position:relative}
.donut::after{content:'';position:absolute;inset:10px;border-radius:50%;background:var(--card)}
.donut span{position:relative;z-index:1;font-weight:800;font-size:16px}
.subhead{font-size:13px;font-weight:700;color:var(--tx);margin:0 0 9px;display:flex;align-items:center;gap:8px}
.subhead svg.i{font-size:16px;color:var(--accent)}
.subhead .pill{margin-left:auto}
</style></head>
<body>
<header>
  <div class="brand">
    <img src="https://www.koro.chat/img/logos/logo-symbol.svg" alt="Koro" onerror="this.style.display='none'">
    <div><b>Koro</b> <span class="sub">Kontrollzentrum</span></div>
  </div>
  <span class="health-chip ok" id="health"><span class="pulse"></span> <span id="healthtx">…</span></span>
  <div class="right">
    <span>served by <b class="mono" id="servedby">–</b></span>
    <span><b id="updated">–</b></span>
    <label class="auto"><input type="checkbox" id="auto" checked> auto</label>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="wrap">
  <div id="err"></div>
  <div id="content"><div class="spin"></div></div>
</div>

<script>
const $=id=>document.getElementById(id);

// ── Lucide-style inline icons (stroke-based, 24×24 viewBox) ────────────
const ICONS={
  layout:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
  video:'<path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/>',

  zap:'<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  chart:'<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
  sliders:'<line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/>',
  monitor:'<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  msg:'<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',

  wifi:'<path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.86a10 10 0 0 1 14 0"/><path d="M8.5 16.43a5 5 0 0 1 7 0"/>',
  cpu:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M9 2v2M15 20v2M9 20v2M2 15h2M2 9h2M20 15h2M20 9h2"/>',
  database:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>',
  redis:'<path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 12 10 5 10-5"/><path d="m2 17 10 5 10-5"/>',
  git:'<circle cx="12" cy="12" r="3"/><line x1="3" x2="9" y1="12" y2="12"/><line x1="15" x2="21" y1="12" y2="12"/>',
  rocket:'<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>',
  activity:'<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  webhook:'<path d="M18 16.98h-5.99c-1.1 0-1.95.94-2.48 1.9A4 4 0 0 1 2 17c.01-.7.2-1.4.57-2"/><path d="m6 17 3.13-5.78c.53-.97.1-2.18-.5-3.1a4 4 0 1 1 6.89-4.06"/><path d="m12 6 3.13 5.73C15.66 12.7 16.9 13 18 13a4 4 0 0 1 0 8"/>',
  bell:'<path d="M10.27 21a1.94 1.94 0 0 0 3.46 0"/><path d="M3.5 19a8.5 8.5 0 0 0 17 0"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>',
  key:'<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
  smartphone:'<rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/>',
  ban:'<circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/>',
  trash:'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
  flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/>',
  refresh:'<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
  cmd:'<path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  checkcircle:'<path d="M21.8 10A10 10 0 1 1 17 3.34"/><path d="m9 11 3 3L22 4"/>',
  alert:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  stop:'<rect x="3" y="3" width="18" height="18" rx="2"/>',
  power:'<path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/>',
  globe:'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
  building:'<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>',
  bot:'<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/>',
  folder:'<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
  trend:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
  calendar:'<path d="M8 2v4M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/>',
  film:'<rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/>',
  dot:'<circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>',
  layers:'<path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 12.18-9.17 4.16a2 2 0 0 1-1.66 0L2 12.18"/><path d="m22 17.18-9.17 4.16a2 2 0 0 1-1.66 0L2 17.18"/>',
};
const ic=(n,extra)=>'<svg class="i'+(extra?' '+extra:'')+'" viewBox="0 0 24 24">'+(ICONS[n]||'')+'</svg>';

const fmtBytes=n=>{if(n==null)return'–';const u=['B','KB','MB','GB','TB'];let i=0;n=+n;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(i?1:0)+' '+u[i]};
const fmtN=n=>n==null?'–':(+n).toLocaleString('de-DE');
const fmtDur=s=>{if(s==null)return'–';s=Math.floor(s);const d=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);return((d?d+'d ':'')+(h?h+'h ':'')+(d?'':m+'m'+(h?'':' '+(s%60)+'s'))).trim()||'0s'};
const ago=ms=>{if(!ms)return'–';const s=Math.floor((Date.now()-ms)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct=n=>n==null?'–':(n*100).toFixed(0)+'%';
const sid=s=>s?String(s).slice(0,8):'–';
const kv=(k,v)=>'<div class="kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
const bar=(p,hot)=>'<div class="bar'+(hot?' hot':'')+'"><i style="width:'+Math.min(100,Math.max(0,p||0)).toFixed(1)+'%"></i></div>';
const card=(title,inner,extra)=>'<div class="card'+(extra?' '+extra:'')+'"><h2>'+title+'</h2>'+inner+'</div>';

// ── Sparkline SVG ──────────────────────────────────────────────
function sparkSvg(points,color){
  if(!points||!points.length)return '<svg class="spark"></svg>';
  const W=300,H=46,pad=3;const max=Math.max(1,...points),min=Math.min(0,...points);
  const rng=(max-min)||1;const n=points.length;
  const x=i=>pad+(n<=1?0:i/(n-1)*(W-2*pad));
  const y=v=>H-pad-((v-min)/rng)*(H-2*pad);
  let d='';points.forEach((v,i)=>d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ');
  const area=d+'L'+x(n-1).toFixed(1)+' '+H+' L'+x(0).toFixed(1)+' '+H+' Z';
  const gid='g'+(spk++);
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0" stop-color="'+color+'" stop-opacity=".22"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')"/>'+
    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/></svg>';
}
let spk=0;
function sparkCard(lbl,icon,points,key,fmt,color,unit){
  const last=points&&points.length?points[points.length-1][key]:null;
  const series=(points||[]).map(p=>p[key]);
  return '<div class="card spark-card"><div class="spark-head"><span class="lbl">'+ic(icon)+lbl+'</span>'+
    '<span class="now">'+(last==null?'–':fmt(last))+'</span><span class="unit">'+(unit||'')+'</span></div>'+
    sparkSvg(series,color)+'</div>';
}

// ── Fetch ──────────────────────────────────────────────────────
async function load(){
  try{
    const r=await fetch('/status/data',{cache:'no-store'});
    if(r.status===401){location.reload();return}
    if(!r.ok)throw new Error('HTTP '+r.status);
    DATA=await r.json();
    $('err').style.display='none';
    paintHeader();renderTabs();renderTab();
  }catch(e){$('err').textContent='Fehler beim Laden: '+e.message;$('err').style.display='block';}
}

function paintHeader(){
  const d=DATA;if(!d)return;
  $('servedby').textContent=d.served_by||'–';
  $('updated').textContent='aktualisiert '+new Date(d.now).toLocaleTimeString('de-DE');
  const h=d.health||{level:'ok',alerts:[]};
  $('health').className='health-chip '+h.level;
  const txt=h.level==='ok'?'Alle Systeme normal':h.level==='warn'?h.alerts.length+' Warnung(en)':h.alerts.length+' kritisch';
  $('health').innerHTML=(h.level==='ok'?'<span class="pulse"></span>':ic(h.level==='crit'?'alert':'alert'))+' '+txt;
}

function instList(){return Object.values((DATA&&DATA.instances)||{}).sort((a,b)=>a.instance>b.instance?1:-1);}
function freshInst(){const n=Date.now();return instList().find(i=>n-i.ts<20000)||instList()[0];}

function wireSessions(){
  $('content').querySelectorAll('[data-sess]').forEach(b=>b.onclick=async()=>{
    const act=b.dataset.sess,id=b.dataset.id;
    const labels={'call.end':'Diesen Call beenden?','meeting.end':'Dieses Meeting beenden?','call.delete':'Call endgültig aus dem Verlauf löschen?','meeting.delete':'Meeting endgültig aus dem Verlauf löschen?','calls.end_stuck':'Alle hängenden Calls (>2h) beenden?'};
    if(!confirm(labels[act]||'Aktion ausführen?'))return;
    const out=$('rs-'+act);b.disabled=true;const orig=b.innerHTML;b.innerHTML=ic('refresh')+'…';
    try{
      const r=await fetch('/status/action/'+act,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(id?{id}:{})});
      const j=await r.json();
      if(out)out.innerHTML=j.ok?'<span class="ok-txt">'+ic('check')+' '+esc(summarize(j))+'</span>':'<span class="err-txt">'+esc(j.error)+'</span>';
      if(j.ok)setTimeout(load,500);
    }catch(e){if(out)out.innerHTML='<span class="err-txt">'+esc(e.message)+'</span>';}
    finally{b.disabled=false;if(!out)b.innerHTML=orig;}
  });
}
function summarize(j){
  if(j.ended!=null)return typeof j.ended==='number'?j.ended+' beendet':'beendet';
  if(j.deleted!=null)return 'gelöscht';
  return 'erledigt';
}

  html+=card(ic('git')+'Git-Historie','<table><tbody>'+((d.git||[]).slice(0,8).map(g=>

function typeTag(t){return t==='boot'?'acc':t==='deploy'?'ok':t==='shutdown'?'warn':'';}

function perf(d){
  const apm=d.apm||{slowest:[],topErrors:[],statusBuckets:{}};
  const sb=apm.statusBuckets||{};
  const total=Object.values(sb).reduce((a,b)=>a+b,0)||1;
  let html='<div class="grid" style="margin-bottom:14px">';
  html+=card(ic('activity')+'HTTP-Status (seit Start)','<div class="statrow">'+
    ['2xx','3xx','4xx','5xx'].map(k=>'<div class="stat"><div class="big '+(k==='5xx'?'err-txt':k==='4xx'?'warn-txt':'ok-txt')+'">'+fmtN(sb[k]||0)+'</div><div class="lbl">'+k+'</div><div class="sub">'+((sb[k]||0)/total*100).toFixed(1)+'%</div></div>').join('')+'</div>');
  const rl=d.rateLimit||{};
  html+=card(ic('shield')+'Rate-Limiting (15 min)',kv('Aktive Buckets',fmtN(rl.activeBuckets))+kv('429-Treffer',fmtN(rl.total))+
    '<div class="note">Top limitierte Schlüssel:</div><table><tbody>'+((rl.top||[]).slice(0,6).map(r=>'<tr><td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">'+esc(r.key)+'</td><td class="num">'+fmtN(r.count)+'</td><td class="muted num">'+ago(r.lastAt)+'</td></tr>').join(''))+'</tbody></table>'+((rl.top||[]).length?'':'<div class="empty">keine Limits ausgelöst</div>'));
  html+='</div>';
  html+=card(ic('zap')+'Langsamste Endpoints (p95)','<table><thead><tr><th>Route</th><th class="num">Anfragen</th><th class="num">Ø ms</th><th class="num">p95 ms</th><th class="num">max ms</th><th class="num">5xx</th></tr></thead><tbody>'+
    (apm.slowest||[]).map(r=>'<tr><td class="mono">'+esc(r.route)+'</td><td class="num">'+fmtN(r.count)+'</td><td class="num">'+r.avgMs.toFixed(1)+'</td><td class="num">'+r.p95Ms.toFixed(0)+'</td><td class="num">'+r.maxMs.toFixed(0)+'</td><td class="num '+(r.errors?'err-txt':'')+'">'+fmtN(r.errors)+'</td></tr>').join('')+'</tbody></table>'+((apm.slowest||[]).length?'':'<div class="empty">noch keine Daten</div>'),'full');
  if((apm.topErrors||[]).length)html+='<div style="margin-top:14px">'+card(ic('alert')+'Endpoints mit Fehlern (5xx)','<table><thead><tr><th>Route</th><th class="num">5xx</th><th class="num">Fehlerquote</th><th class="num">Anfragen</th></tr></thead><tbody>'+
    apm.topErrors.map(r=>'<tr><td class="mono">'+esc(r.route)+'</td><td class="num err-txt">'+fmtN(r.errors)+'</td><td class="num">'+(r.errorRate*100).toFixed(1)+'%</td><td class="num">'+fmtN(r.count)+'</td></tr>').join('')+'</tbody></table>','full')+'</div>';
  return html;
}

function security(d){
  const a=d.audit||{events:[]};
  let html='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('key','Fehl-Logins (24h)',fmtN(a.failedLogins))+
    statCard('smartphone','Neue Geräte (24h)',fmtN(a.newDevices))+
    statCard('ban','Revokes (24h)',fmtN(a.revokes))+
    statCard('trash','Löschungen (24h)',fmtN(a.deletions))+
  '</div>';
  const sc=d.scheduler||{jobs:{}};
  const overdue=sc.lastTickAt&&Date.now()-sc.lastTickAt>90000;
  html+='<div class="grid" style="margin-bottom:14px">';
  html+=card(ic('clock')+'Scheduler<span class="r">'+(overdue?'<span class="pill err">'+ic('alert')+'überfällig</span>':'<span class="pill ok">'+ic('check')+'aktiv</span>')+'</span>',
    kv('Letzter Tick',ago(sc.lastTickAt)+' her')+kv('Intervall',(sc.tickMs/1000)+'s')+
    '<table><tbody>'+Object.entries(sc.jobs||{}).map(([n,j])=>'<tr><td>'+esc(n)+'</td><td class="muted num">'+ago(j.lastRunAt)+'</td><td class="num">'+j.lastDurationMs+' ms</td><td>'+(j.lastError?'<span class="tag err">Fehler</span>':'<span class="tag ok">ok</span>')+'</td></tr>').join('')+'</tbody></table>');
  const wh=d.webhooks||{};
  html+=card(ic('webhook')+'Webhooks',wh.ok?kv('Endpoints',fmtN(wh.hooks))+kv('Wartend',fmtN(wh.pending))+kv('Zugestellt (24h)','<span class="ok-txt">'+fmtN(wh.deliveredToday)+'</span>')+kv('Fehlgeschlagen (24h)','<span class="err-txt">'+fmtN(wh.failedToday)+'</span>')+kv('Dead-Letter',wh.deadletter?'<span class="err-txt">'+fmtN(wh.deadletter)+'</span>':'0')+kv('Erfolgsquote',pct(wh.successRate)):'<div class="empty">'+esc(wh.error||'n/a')+'</div>');
  const pu=d.push||{};
  html+=card(ic('bell')+'Push-Zustellung',kv('Gesendet',fmtN(pu.sent))+kv('Fehlgeschlagen','<span class="'+(pu.failed?'err-txt':'')+'">'+fmtN(pu.failed)+'</span>')+kv('Tote Tokens',fmtN(pu.dead))+kv('Erfolgsquote',pu.successRate==null?'<span class="dim">noch keine Daten</span>':pct(pu.successRate)));
  html+='</div>';
  html+=card(ic('shield')+'Audit-Feed (letzte 40)','<table><thead><tr><th>Zeit</th><th>Aktion</th><th>Ziel</th><th>IP</th></tr></thead><tbody>'+
    (a.events||[]).map(e=>'<tr><td class="muted">'+ago(new Date(e.created_at).getTime())+'</td><td><span class="tag '+(/(fail|revoke|delete|block)/.test(e.action)?'err':'acc')+'">'+esc(e.action)+'</span></td><td class="muted">'+esc(e.target_type||'')+'</td><td class="mono dim">'+esc(e.ip_address||'')+'</td></tr>').join('')+'</tbody></table>'+((a.events||[]).length?'':'<div class="empty">'+esc(a.error||'keine Events')+'</div>'),'full');
  return html;
}

function product(d){
  const k=d.kpis||{},cl=d.clients||{byKind:{}};
  let html='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('users','Nutzer gesamt',fmtN(k.usersTotal),'+'+fmtN(k.usersToday)+' heute')+
    statCard('trend','Neu (7 Tage)',fmtN(k.usersWeek))+
    statCard('activity','Aktiv (7 Tage)',fmtN(k.activeUsersWeek),'Geräte mit Aktivität')+
    statCard('msg','Nachrichten (24h)',fmtN(k.messagesToday))+
  '</div>';
  html+='<div class="grid k4" style="margin-bottom:14px">'+
    statCard('video','Meetings gesamt',fmtN(k.meetingsTotal))+
    statCard('folder','Workspaces',fmtN(k.workspacesTotal))+
    statCard('bot','Bots',fmtN(k.botsTotal))+
  '</div>';
  const kinds=cl.byKind||{};const totalC=Object.values(kinds).reduce((a,b)=>a+(b||0),0)||1;
  const labels={mobile:['smartphone','Mobile'],web:['globe','Web'],desktop:['monitor','Desktop'],crm_seat:['building','CRM'],api_bot:['bot','Bot']};
  html+=card(ic('chart')+'Client-Verteilung (aktive Geräte, 7 Tage)','<div style="display:flex;flex-direction:column;gap:11px">'+
    Object.entries(labels).map(([kk,[icn,lbl]])=>'<div><div class="kv"><span class="k">'+ic(icn)+' '+lbl+'</span><span class="v">'+fmtN(kinds[kk])+' · '+((kinds[kk]||0)/totalC*100).toFixed(0)+'%</span></div>'+bar((kinds[kk]||0)/totalC*100)+'</div>').join('')+'</div>'+
    '<div class="note">Wichtig vor Breaking-Changes: zeigt, wie viele Geräte je Plattform noch aktiv sind.</div>');
  return html;
}

// ── Actions tab ────────────────────────────────────────────────

  const wh=d.webhooks||{};
  return '<div class="grid">'+
    card(ic('refresh')+'Webhooks erneut zustellen',
      '<p class="muted" style="margin-top:0">Setzt fehlgeschlagene Zustellungen (Dead-Letter, letzte 24h) zurück, damit der Worker erneut versucht.</p>'+
      kv('In Dead-Letter',(wh.deadletter||0)+'')+
      '<div class="field" style="margin-top:12px"><button class="btn primary" data-act="webhooks.retry">'+ic('refresh')+'Erneut zustellen</button></div>'+
      '<div class="note" id="r-webhooks.retry"></div>')+
    card(ic('ban')+'Gerät widerrufen',
      '<p class="muted" style="margin-top:0">Notfall: widerruft ein einzelnes Gerät sofort und trennt seine Verbindung.</p>'+
      '<div class="field"><input class="in" id="revoke-id" placeholder="device_id (UUID)" style="flex:1;min-width:220px"><button class="btn danger" data-act="device.revoke">'+ic('ban')+'Widerrufen</button></div>'+
      '<div class="note" id="r-device.revoke"></div>')+
    card(ic('activity')+'Event-Log leeren',
      '<p class="muted" style="margin-top:0">Leert das Boot-/Deploy-/Restart-Protokoll in Redis (rein kosmetisch).</p>'+
      '<div class="field"><button class="btn" data-act="events.clear">'+ic('trash')+'Log leeren</button></div>'+
      '<div class="note" id="r-events.clear"></div>')+
    card(ic('flag')+'Feature-Flag setzen','<div class="full">'+
      '<div class="field"><input class="in" id="flag-key" placeholder="flag_key" style="flex:1;min-width:160px">'+
      '<select class="in" id="flag-rollout"><option value="off">off</option><option value="on">on</option><option value="percent">percent</option></select>'+
      '<input class="in" id="flag-pct" placeholder="%" style="width:70px">'+
      '<button class="btn primary" data-act="flag.set">'+ic('check')+'Speichern</button></div>'+
      '<div class="note" id="r-flag.set"></div>'+
      '<div id="flaglist" style="margin-top:12px"></div></div>','full')+
  '</div>';
}
function wireActions(){
  loadFlags();
  $('content').querySelectorAll('[data-act]').forEach(b=>b.onclick=async()=>{
    const act=b.dataset.act;const out=$('r-'+act);b.disabled=true;if(out)out.textContent='läuft…';
    let body={};
    if(act==='device.revoke')body={deviceId:$('revoke-id').value.trim()};
    if(act==='flag.set')body={key:$('flag-key').value.trim(),rollout:$('flag-rollout').value,percent:$('flag-pct').value?+$('flag-pct').value:null};
    try{
      const r=await fetch('/status/action/'+act,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json();
      if(out)out.innerHTML=j.ok?'<span class="ok-txt">'+ic('check')+' '+esc(JSON.stringify({...j,ok:undefined,action:undefined}).replace(/[{}"]/g,'').replace(/,/g,', ')||'erledigt')+'</span>':'<span class="err-txt">'+esc(j.error)+'</span>';
      if(act==='flag.set')loadFlags();
    }catch(e){if(out)out.innerHTML='<span class="err-txt">'+esc(e.message)+'</span>';}
    finally{b.disabled=false;}
  });
}
async function loadFlags(){
  try{const r=await fetch('/status/flags',{cache:'no-store'});const j=await r.json();FLAGS=j.flags||[];
    const el=$('flaglist');if(!el)return;
    el.innerHTML='<table><thead><tr><th>Flag</th><th>Rollout</th><th class="num">%</th><th></th></tr></thead><tbody>'+
      FLAGS.map(f=>'<tr><td class="mono">'+esc(f.key)+'</td><td><span class="tag '+(f.rollout==='on'?'ok':f.rollout==='off'?'':'acc')+'">'+esc(f.rollout)+'</span></td><td class="num">'+(f.percent??'–')+'</td>'+
        '<td class="num"><button class="btn sm" data-flagdel="'+esc(f.key)+'" title="Flag löschen">'+ic('trash')+'</button></td></tr>').join('')+'</tbody></table>'+(FLAGS.length?'':'<div class="empty">keine Flags</div>');
    el.querySelectorAll('[data-flagdel]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Flag „'+b.dataset.flagdel+'" löschen?'))return;
      b.disabled=true;
      try{await fetch('/status/action/flag.delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:b.dataset.flagdel})});loadFlags();}catch{b.disabled=false;}
    });
  }catch{}
}

renderTabs();
load();
let timer=setInterval(()=>{if($('auto').checked)load();},5000);
$('auto').addEventListener('change',()=>{if($('auto').checked)load();});
</script>
