# Reverse-proxy stack (Traefik). Independent of every other stack.
# Start:   docker compose -f deploy/docker-compose.proxy.yml up -d
# Reload:  docker compose -f deploy/docker-compose.proxy.yml up -d   (only this container)
name: proxy

services:
  traefik:
    # v3 = aktuellstes v3.x. NICHT auf v3.3 pinnen: dessen Docker-Client ist zu
    # alt für neue Docker-Engines (API >= 1.40) und die Auto-Discovery schlägt
    # mit "client version 1.24 is too old" fehl.
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - letsencrypt:/letsencrypt
    networks:
      - edge

volumes:
  letsencrypt:

# The shared network every public-facing service joins. Created once, by hand:
#   docker network create edge
networks:
  edge:
    external: true
